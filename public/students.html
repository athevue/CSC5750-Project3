<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registered Students</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <header>
      <h1>Registered Students</h1>
      <p>All students signed up for demo slots</p>
      <a href="index.html">← Back to Registration</a>
    </header>

    <section class="table-section">
      <h2>Student List</h2>

      <table id="studentsTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Project</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Time Slot</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="6">Loading students...</td>
          </tr>
        </tbody>
      </table>
    </section>

  </div>

  <script>
    async function loadStudents() {
      try {
        const response = await fetch("https://csc5750-project3.onrender.com/students");
        const data = await response.json();

        const tableBody = document.querySelector("#studentsTable tbody");
        tableBody.innerHTML = "";

        if (data.length === 0) {
          tableBody.innerHTML = "<tr><td colspan='6'>No students registered yet.</td></tr>";
          return;
        }

        data.forEach(student => {
          const row = document.createElement("tr");

          row.innerHTML = `
            <td>${student.id}</td>
            <td>${student.first_name} ${student.last_name}</td>
            <td>${student.project_title}</td>
            <td>${student.email}</td>
            <td>${student.phone}</td>
            <td>Slot ${student.timeslot_id}</td>
          `;

          tableBody.appendChild(row);
        });

      } catch (error) {
        console.error("Error loading students:", error);
      }
    }

    loadStudents();
  </script>

</body>
</html>
